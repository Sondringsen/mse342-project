# Horizon comparison pipeline.
# Data defaults mirror FinDiffusion/configs/default.yaml.

data:
  tickers: ["AAPL", "MSFT", "GOOGL", "AMZN", "META", "NVDA", "TSLA", "JPM", "V", "JNJ",
            "WMT", "PG", "MA", "HD", "DIS", "PYPL", "ADBE", "NFLX", "INTC", "CSCO",
            "PFE", "KO", "PEP", "MRK", "ABT", "TMO", "COST", "AVGO", "NKE", "MCD"]
  start_date: "2005-01-01"
  end_date: "2024-01-01"
  train_ratio: 0.6
  val_ratio: 0.2
  test_ratio: 0.2
  history_length: 252
  prediction_length: 1
  stride: 1
  normalize: true
  data_dir: "FinDiffusion_CSDI_Pipeline/data"
  price_cache: "yahoo_prices.csv"
  returns_cache: "log_returns.csv"

model:
  input_dim: 1
  d_model: 256
  n_layers: 6
  n_heads: 8
  d_ff: 1024
  condition_dim: 128
  timesteps: 1000
  beta_start: 0.0001
  beta_end: 0.02
  beta_schedule: "linear"
  prediction_type: "epsilon"
  dropout: 0.1

training:
  epochs: 100
  batch_size: 64
  lr: 0.0001
  weight_decay: 0.01
  betas: [0.9, 0.999]
  clip_grad_norm: 1.0
  min_lr: 0.000001
  use_amp: true
  seed: 42
  num_workers: 0
  save_best: true

sampling:
  n_samples: 25
  batch_size: 16
  use_ddim: true
  ddim_steps: 50
  max_eval_windows_per_asset: 128

paths:
  output_dir: "FinDiffusion_CSDI_Pipeline/outputs"
